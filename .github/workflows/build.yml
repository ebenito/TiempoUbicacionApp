name: Build MAUI App

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    env:
      MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4          # v4 es la versión actual recomendada

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui android

      - name: Restore dependencies
        run: dotnet restore
        
      - name: Restore Windows
        run: dotnet restore -r win-x64
        
      - name: Build Android
        run: dotnet build -f net10.0-android --configuration Release --no-restore

      - name: Build Windows
        run: dotnet build -f net10.0-windows10.0.26100.0 --configuration Release --no-restore
